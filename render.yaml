services:
  - type: web
    name: p2603-calculadora-ciclo-vida-tuberia
    runtime: python
    plan: free
    buildCommand: "pip install -r requirements.txt"
    startCommand: "uvicorn webapp.main:app --host 0.0.0.0 --port $PORT"
    envVars:
      - key: PYTHON_VERSION
        value: "3.11"
    healthCheckPath: /health
